name: Build WGCF Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: build-workspace-governance-control-fabric-image
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/workspace-governance-control-fabric
          tags: |
            type=sha,format=short,prefix=sha-

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Workspace Governance Control Fabric
            org.opencontainers.image.description=Runtime implementation fabric for workspace governance graph, validation planning, receipts, and admission
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Smoke test runtime image
        env:
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/workspace-governance-control-fabric@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          cid="$(docker run -d --rm -p 18090:8080 "${IMAGE_REF}")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if wget -qO- http://127.0.0.1:18090/healthz | grep -q '"status":"ok"'; then
              wget -qO- http://127.0.0.1:18090/readyz | grep -q '"ready":true'
              exit 0
            fi
            sleep 1
          done

          docker logs "$cid"
          exit 1

      - name: Publish build summary
        run: |
          {
            echo "## Workspace Governance Control Fabric Image"
            echo
            echo "- Image: \`ghcr.io/${{ github.repository_owner }}/workspace-governance-control-fabric\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Source SHA: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write release metadata
        run: |
          cat > release-metadata.json <<EOF
          {
            "component": "workspace-governance-control-fabric",
            "repository": "ghcr.io/${{ github.repository_owner }}/workspace-governance-control-fabric",
            "digest": "${{ steps.build.outputs.digest }}",
            "sourceSha": "${{ github.sha }}",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}",
            "runAttempt": "${{ github.run_attempt }}"
          }
          EOF

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: workspace-governance-control-fabric-release-metadata
          path: release-metadata.json
